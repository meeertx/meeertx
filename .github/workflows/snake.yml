name: Generate Snake Animation

on:
  # Run twice a day so the snake stays up to date
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual run from the Actions tab
  workflow_dispatch:
  # Also regenerate on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: meeertx
          # Themed to match the README: dark empty cells, cyan activity ramp, purple snake
          outputs: |
            dist/snake.svg?color_snake=#8B5CF6&color_dots=#161b22,#0e7490,#0891b2,#06b6d4,#22d3ee

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
